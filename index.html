<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイクラサーバー状況</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; padding-top: 50px; }
        .status-box { border: 2px solid #444; padding: 30px; border-radius: 15px; display: inline-block; background: #333; }
        .online { color: #00ff00; font-weight: bold; }
        .offline { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status-box">
        <h2 id="ip-display">読み込み中...</h2>
        <p id="status">ステータス確認中...</p>
        <p id="players">人数: -- / --</p>
    </div>

    <script>
        // プロキシのアドレスとポート
        const serverIP = 'node1.swdhst.com:2074'; 

        async function updateStatus() {
            try {
                const response = await fetch(`https://api.mcsrvstat.us{serverIP}`);
                const data = await response.json();

                document.getElementById('ip-display').innerText = serverIP;

                if (data.online) {
                    document.getElementById('status').innerText = "● 稼働中 (Online)";
                    document.getElementById('status').className = "online";
                    document.getElementById('players').innerText = `接続人数: ${data.players.online} / ${data.players.max}`;
                } else {
                    document.getElementById('status').innerText = "● オフライン (Offline)";
                    document.getElementById('status').className = "offline";
                    document.getElementById('players').innerText = "サーバーが停止しているか、Queryが閉じています";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "通信エラーが発生しました";
            }
        }

        updateStatus();
        // 1分ごとに自動更新
        setInterval(updateStatus, 60000);
    </script>
</body>
</html>
